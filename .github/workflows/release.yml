name: Release

# Fires when you publish a GitHub Release (you write the tag + notes and click
# Publish); this job then builds every target and attaches the binaries to that
# same release. It never creates tags or releases itself.
on:
  release:
    types: [published]

# Uploading assets to the release needs write access to repo contents.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe` in the Makefile stamps the
          # published tag (e.g. v1.0.1) into each binary rather than a bare hash.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release binaries
        run: make release

      - name: Attach binaries to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/lazyplanner_*
            dist/sha256sums.txt
